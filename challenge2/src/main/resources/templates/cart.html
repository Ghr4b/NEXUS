<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CyberShop - Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CyberShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/products/search?category=electronics">Catalog</a>
                    </li>
                    <li class="nav-item"><a class="nav-link active" href="/cart">Cart</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2>Your Shopping Cart</h2>

        <div th:if="${message}" class="alert alert-success" role="alert" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

        <ul class="list-group mb-4">
            <li class="list-group-item d-flex justify-content-between lh-sm">
                <div>
                    <h6 class="my-0">Mechanical Keyboard XYZ</h6>
                    <small class="text-muted">High quality peripheral</small>
                </div>
                <span class="text-muted">$149.99</span>
            </li>
            <li class="list-group-item d-flex justify-content-between lh-sm">
                <div>
                    <h6 class="my-0">USB-C Hub 8-in-1</h6>
                    <small class="text-muted">Essential accessory</small>
                </div>
                <span class="text-muted">$45.00</span>
            </li>
            <li class="list-group-item d-flex justify-content-between">
                <span>Total (USD)</span>
                <strong>$194.99</strong>
            </li>
        </ul>

        <form action="/cart/apply-promo" method="post" class="card p-2">
            <div class="input-group">
                <input type="text" name="promoCode" class="form-control" placeholder="Promo code" required>
                <button type="submit" class="btn btn-secondary">Redeem</button>
            </div>
            <small class="text-muted mt-2 px-1">Example codes: SAVE-10, WINTER2026, SUMMER-SALE-20</small>
        </form>
    </div>
</body>

</html>
