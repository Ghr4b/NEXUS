<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Catalog - CyberShop')}">
    <style>
        .filter-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .08);
        }

        .filter-card .card-header {
            background: #212529;
            color: #fff;
            border-radius: 12px 12px 0 0;
            font-weight: 600;
            letter-spacing: .5px;
        }

        .product-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .08);
            transition: transform .2s, box-shadow .2s;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, .15);
        }

        .product-card img {
            height: 180px;
            object-fit: cover;
            width: 100%;
            background: #f0f0f0;
        }

        .stock-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .active-filter-tag {
            background: #0dcaf0;
            color: #212529;
            font-weight: 600;
            font-size: .8rem;
            border-radius: 20px;
            padding: 4px 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .sidebar-section {
            margin-bottom: 1.4rem;
        }

        .sidebar-section h6 {
            font-weight: 700;
            font-size: .82rem;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: #6c757d;
            margin-bottom: .7rem;
        }

        .search-input-wrap .form-control:focus {
            box-shadow: 0 0 0 .25rem rgba(13, 202, 240, .25);
            border-color: #0dcaf0;
        }

        .price-range input {
            width: 80px;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container-fluid my-4 px-4">

        <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
            <div>
                <h4 class="fw-bold mb-0"><i class="bi bi-grid-3x3-gap text-primary"></i> Product Catalog</h4>
                <small class="text-muted" th:text="${products.size()} + ' products found'">0 products found</small>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <span th:if="${selectedCategory != null and !selectedCategory.isEmpty()}" class="active-filter-tag">
                    <i class="bi bi-tag-fill"></i>
                    <span th:text="${selectedCategory}"></span>
                    <a th:href="@{/catalog}" class="text-dark text-decoration-none">&times;</a>
                </span>
                <span th:if="${inStockOnly}" class="active-filter-tag bg-success text-white">
                    <i class="bi bi-check-circle-fill"></i> In Stock Only
                </span>
                <span th:if="${searchApplied}" class="active-filter-tag bg-warning">
                    <i class="bi bi-search"></i>
                    <span th:text="|&quot;${searchTerm}&quot;|"></span>
                    <a th:href="@{/catalog}" class="text-dark text-decoration-none">&times;</a>
                </span>
            </div>
        </div>

        <div class="row g-4">

            <div class="col-lg-2 col-md-3">
                <form id="sidebarForm" action="/catalog" method="get">

                    <div class="filter-card card mb-3">
                        <div class="card-header py-2"><i class="bi bi-sliders"></i> Search &amp; Filters</div>
                        <div class="card-body p-3">

                            <div class="sidebar-section search-input-wrap">
                                <h6><i class="bi bi-search"></i> Search Products</h6>
                                <input type="text" name="search" class="form-control form-control-sm"
                                    placeholder="Product name…" th:value="${searchTerm}">
                            </div>

                            <hr>

                            <div class="sidebar-section">
                                <h6><i class="bi bi-tag"></i> Category</h6>
                                <div class="d-flex flex-column gap-1">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="category" id="catAll"
                                            value="" th:checked="${selectedCategory == null or selectedCategory == ''}">
                                        <label class="form-check-label" for="catAll">All</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="category" id="catPeripherals"
                                            value="peripherals" th:checked="${selectedCategory == 'peripherals'}">
                                        <label class="form-check-label" for="catPeripherals">
                                            <i class="bi bi-keyboard text-primary"></i> Peripherals
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="category" id="catAccessories"
                                            value="accessories" th:checked="${selectedCategory == 'accessories'}">
                                        <label class="form-check-label" for="catAccessories">
                                            <i class="bi bi-usb-plug text-success"></i> Accessories
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="category" id="catElectronics"
                                            value="electronics" th:checked="${selectedCategory == 'electronics'}">
                                        <label class="form-check-label" for="catElectronics">
                                            <i class="bi bi-display text-danger"></i> Electronics
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <hr>

                            <div class="sidebar-section">
                                <h6><i class="bi bi-currency-dollar"></i> Price Range</h6>
                                <div class="d-flex align-items-center gap-2 price-range">
                                    <input type="number" name="minPrice" class="form-control form-control-sm"
                                        placeholder="Min" th:value="${minPrice}" min="0">
                                    <span class="text-muted small">–</span>
                                    <input type="number" name="maxPrice" class="form-control form-control-sm"
                                        placeholder="Max" th:value="${maxPrice}" min="0">
                                </div>
                            </div>

                            <hr>

                            <div class="sidebar-section">
                                <h6><i class="bi bi-box-seam"></i> Availability</h6>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="inStock" name="inStock"
                                        value="true" th:checked="${inStockOnly}">
                                    <label class="form-check-label fw-semibold" for="inStock">In Stock Only</label>
                                </div>
                            </div>

                            <hr>

                            <div class="sidebar-section mb-3">
                                <h6><i class="bi bi-sort-down"></i> Sort By</h6>
                                <select name="sort" class="form-select form-select-sm" onchange="this.form.submit()">
                                    <option value="default" th:selected="${selectedSort == 'default'}">Default</option>
                                    <option value="price_asc" th:selected="${selectedSort == 'price_asc'}">Price: Low →
                                        High</option>
                                    <option value="price_desc" th:selected="${selectedSort == 'price_desc'}">Price: High
                                        → Low</option>
                                    <option value="name_asc" th:selected="${selectedSort == 'name_asc'}">Name: A → Z
                                    </option>
                                    <option value="popular" th:selected="${selectedSort == 'popular'}">Most Ordered
                                        First</option>
                                </select>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-dark btn-sm"><i class="bi bi-check2-circle"></i>
                                    Apply</button>
                                <a href="/catalog" class="btn btn-outline-secondary btn-sm"><i
                                        class="bi bi-x-circle"></i> Reset All</a>
                            </div>

                        </div>
                    </div>

                </form>
            </div>

            <div class="col-lg-10 col-md-9">

                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-shield-exclamation me-1"></i>
                    <strong>Search Error:</strong> <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="row g-3">
                    <div th:each="product : ${products}" class="col-xl-3 col-lg-4 col-md-6">
                        <div class="card product-card h-100">
                            <img th:src="${product.imageUrl}" alt="Product Image">
                            <div class="card-body d-flex flex-column p-3">
                                <div class="d-flex justify-content-between align-items-start mb-1">
                                    <span class="badge bg-secondary text-uppercase" style="font-size:.72rem;"
                                        th:text="${product.category}">cat</span>
                                    <span class="d-flex align-items-center gap-1">
                                        <span class="stock-indicator"
                                            th:classappend="${product.stockQuantity > 0} ? 'bg-success' : 'bg-danger'"></span>
                                        <small class="text-muted"
                                            th:text="${product.stockQuantity > 0} ? 'In stock' : 'Out of stock'">Stock</small>
                                    </span>
                                </div>
                                <h6 class="fw-bold mt-1 mb-1" th:text="${product.name}">Product Name</h6>
                                <p class="text-muted small flex-grow-1 mb-2"
                                    style="display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"
                                    th:text="${product.description}">Description</p>
                                <div class="d-flex justify-content-between align-items-center mt-auto">
                                    <span class="fs-5 fw-bold text-success"
                                        th:text="${'$' + product.price}">$0.00</span>
                                    <a th:href="@{/product/{id}(id=${product.id})}"
                                        class="btn btn-primary btn-sm rounded-pill px-3">
                                        <i class="bi bi-eye"></i> View
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(products)}" class="col-12">
                        <div class="text-center py-5 text-muted">
                            <i class="bi bi-search display-1 mb-3"></i>
                            <h4>No products match your search</h4>
                            <p>Try different keywords or adjust your filters.</p>
                            <a href="/catalog" class="btn btn-primary mt-2">Clear All Filters</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
