<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CyberShop - Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CyberShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active"
                            href="/products/search?category=electronics">Catalog</a></li>
                    <li class="nav-item"><a class="nav-link" href="/cart">Cart</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2>Product Catalog</h2>
        <form action="/products/search" method="get" class="mb-4">
            <div class="input-group">
                <input type="text" name="category" class="form-control" placeholder="Search by category..." required>
                <button type="submit" class="btn btn-primary">Search</button>
            </div>
            <small class="text-muted">Categories: electronics, accessories, peripherals</small>
        </form>

        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" th:each="product : ${products}">
                <div class="card h-100">
                    <img th:src="${product.image_url}" class="card-img-top" th:alt="${product.name}">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${product.name}"></h5>
                        <p class="card-text" th:text="${product.description}"></p>
                    </div>
                    <div class="card-footer d-flex justify-content-between align-items-center">
                        <span class="fs-5 fw-bold" th:text="'$' + ${product.price}"></span>
                        <a href="/cart" class="btn btn-outline-success btn-sm">Add to Cart</a>
                    </div>
                </div>
            </div>
            <div class="col-12" th:if="${products == null or products.isEmpty()}">
                <p class="text-muted">No products found in this category.</p>
            </div>
        </div>
    </div>
</body>

</html>
