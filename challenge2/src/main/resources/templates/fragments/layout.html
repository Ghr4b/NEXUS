<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">CyberShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
            color: #0dcaf0 !important;
        }

        .hero-section {
            background: linear-gradient(135deg, #212529 0%, #343a40 100%);
            color: white;
            padding: 100px 0;
        }

        .card-product {
            transition: transform 0.2s;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card-product:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body>
    <div th:fragment="navbar">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="/">
                    <i class="bi bi-cpu"></i> CyberShop
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="/catalog">Catalog</a></li>
                    </ul>
                    <ul class="navbar-nav">
                        <li class="nav-item me-2">
                            <a class="nav-link" href="/cart">
                                <i class="bi bi-cart3"></i> Cart
                                <span class="badge bg-danger rounded-pill" th:if="${session.cart != null}"
                                    th:text="${session.cart.size()}">0</span>
                            </a>
                        </li>
                        <li class="nav-item dropdown" th:if="${session.USER_ID != null}">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                                data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle"></i> <span th:text="${session.USERNAME}">User</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="/orders">My Orders</a></li>
                                <li th:if="${session.ROLE == 'ADMIN'}"><a class="dropdown-item" href="/admin">Admin
                                        Dashboard</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="/logout">Logout</a></li>
                            </ul>
                        </li>
                        <li class="nav-item" th:if="${session.USER_ID == null}">
                            <a class="nav-link" href="/login">Login</a>
                        </li>
                        <li class="nav-item" th:if="${session.USER_ID == null}">
                            <a class="btn btn-outline-info btn-sm mt-1 ms-2" href="/register">Sign Up</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <div th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>

</html>
