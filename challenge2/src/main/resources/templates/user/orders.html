<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('My Orders - CyberShop')}"></head>

<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container my-5">
        <h2 class="mb-4"><i class="bi bi-box-seam"></i> Order History</h2>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Order ID</th>
                                <th>Date</th>
                                <th>Total Price</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td th:text="${'ORD-' + order.id}">ORD-0</td>
                                <td th:text="${#calendars.format(order.createdAt, 'dd MMM yyyy HH:mm')}">Date</td>
                                <td class="fw-bold" th:text="${'$' + order.totalPrice}">$0.00</td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${order.status == 'DELIVERED'} ? 'bg-success' : 'bg-warning text-dark'"
                                        th:text="${order.status}">Status</span>
                                </td>
                                <td>
                                    <a th:href="@{/orders/{id}(id=${order.id})}"
                                        class="btn btn-sm btn-outline-primary">Track Order</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(orders)}">
                                <td colspan="5" class="text-center py-4 text-muted">You have no previous orders.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
